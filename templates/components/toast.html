{% comment %}
Toast notification component.
Usage:
    {% include "components/toast.html" with toast_id="scanToast" toast_title="Alert" toast_body="QR scanned!" %}
{% endcomment %}
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="{{ toast_id }}" class="toast" role="alert"
         aria-live="assertive" aria-atomic="true">
        <div class="toast-header">
            <i class="bi bi-bell-fill text-primary me-2"></i>
            <strong class="me-auto">{{ toast_title }}</strong>
            <small>{{ toast_time|default:"just now" }}</small>
            <button type="button" class="btn-close"
                    data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body">
            {{ toast_body }}
        </div>
    </div>
</div>
