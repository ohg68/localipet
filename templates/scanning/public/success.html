{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% trans "Message Sent" %} — Localipet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">
    <div class="card shadow-lg text-center" style="max-width: 420px; width: 100%; border-radius: 1rem;">
        <div class="card-body p-5">
            <div class="text-success mb-3">
                <i class="bi bi-check-circle-fill" style="font-size: 4rem;"></i>
            </div>
            <h3>{% trans "Message sent!" %}</h3>
            <p class="text-muted">
                {% trans "The owner has been notified. They will contact you soon." %}
            </p>
            <p class="text-muted small">
                {% trans "Thank you for helping this pet!" %}
            </p>
            <hr>
            <p class="small text-muted mb-0">
                {% trans "Powered by" %} <strong>Localipet</strong>
            </p>
        </div>
    </div>
</body>
</html>
